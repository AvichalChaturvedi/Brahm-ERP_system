# ============================================
# Nginx Reverse Proxy Configuration
# ============================================
# For PLM Stack - InvenTree + Odoo
# ============================================

events {
    worker_connections 1024;
}

http {
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml;

    # Timeouts
    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ========================================
    # UPSTREAM DEFINITIONS
    # ========================================
    upstream inventree_backend {
        server inventree:8000;
        keepalive 32;
    }

    upstream odoo_backend {
        server odoo:8069;
        keepalive 32;
    }

    # ========================================
    # HTTP SERVER (Redirect to HTTPS)
    # ========================================
    server {
        listen 80;
        server_name _;

        # Uncomment for HTTPS redirect
        # return 301 https://$host$request_uri;
    }

    # ========================================
    # HTTPS SERVER (Optional - needs SSL certs)
    # ========================================
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL Certificate (place in ./ssl folder)
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # SSL Settings
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Your locations here...
    # }

    # ========================================
    # LOCATION: ROOT REDIRECT
    # ========================================
    server {
        listen 80;
        server_name _;
        
        # Root redirect to InvenTree
        location = / {
            return 301 http://$host:8000;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ========================================
    # INVIRTREE SERVER BLOCK
    # ========================================
    server {
        listen 8001;
        server_name _;

        # InvenTree root
        location / {
            proxy_pass http://inventree_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # API endpoint with higher limits
        location /api/ {
            proxy_pass http://inventree_backend/api/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }

    # ========================================
    # ODOO SERVER BLOCK
    # ========================================
    server {
        listen 8069;
        server_name _;

        # Odoo longpolling (for real-time updates)
        location /longpolling {
            proxy_pass http://odoo_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        # WebSocket for Odoo
        location /websocket {
            proxy_pass http://odoo_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # Static files (cached)
        location ~* ^/web/static/ {
            proxy_pass http://odoo_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Cache static files
            proxy_cache_valid 200 60m;
            expires 60m;
            add_header Cache-Control "public, immutable";
        }

        # Odoo main
        location / {
            proxy_pass http://odoo_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Required for Odoo session handling
            proxy_set_header X-Odoo-Override-Sentry true;
            
            proxy_redirect off;
        }
    }

    # ========================================
    # UNIFIED ACCESS POINT (via subpaths)
    # ========================================
    # Uncomment to access both via single domain:
    # - http://your-ip/inventree/...
    # - http://your-ip/ (Odoo)
    
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #
    #     # Odoo at root
    #     location / {
    #         proxy_pass http://odoo_backend;
    #         include proxy_params;
    #     }
    #
    #     # InvenTree at /inventree/
    #     location /inventree/ {
    #         rewrite ^/inventree/(.*) /$1 break;
    #         proxy_pass http://inventree_backend/;
    #         include proxy_params;
    #     }
    # }
}
