version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-portal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portal_pass}
      POSTGRES_DB: ${DB_NAME:-portal_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portal_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portal_backend
    restart: unless-stopped
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-portal_user}:${DB_PASSWORD:-portal_pass}@db:5432/${DB_NAME:-portal_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OCTOPARTS_API_KEY: ${OCTOPARTS_API_KEY:-}
      JLC_API_KEY: ${JLC_API_KEY:-}
      LION_API_KEY: ${LION_API_KEY:-}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m flask run --host=0.0.0.0

  frontend:
    build: ./frontend
    container_name: portal_frontend
    restart: unless-stopped
    ports:
      - "3000:4173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:5000
    command: npm run preview

volumes:
  postgres_data:
    name: portal_postgres_data
